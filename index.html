<title>Fretboardwalk</title>

<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 32 32" aria-hidden="true"><g fill="currentColor"><ellipse cx="11.6" cy="22.6" rx="5.6" ry="4.3" transform="rotate(-22 11.6 22.6)"/><rect x="15.3" y="6.6" width="2.1" height="16.4" rx="1"/><path d="M17.4 6.2c4.6 1.8 8.4 4.3 8.4 8.7 0 2.5-1.2 4.4-2.4 5.3 1.1-3.7-1.4-6.4-6-8.7z"/></g></svg></div>
      <h1>Fretboardwalk</h1>
    </div>
    <div class="header-right">
      <div class="streak" id="streakBox">
        <span class="v" id="streakVal">0</span><span class="l">streak</span>
      </div>
      <div class="key-select">
        <select id="keySelect" aria-label="Key"></select>
      </div>
      <button class="gear-btn" id="gearBtn" aria-label="Settings"><span></span></button>
    </div>
  </header>

  <div class="settings" id="settingsDrawer">
    <div class="settings-inner">
      <div class="setting-row stack">
        <span>Scale notes on the neck</span>
        <div class="segmented" id="noteVisibilitySeg">
          <button class="seg-btn" data-val="numerals">Numerals</button>
          <button class="seg-btn" data-val="dots">Dots only</button>
          <button class="seg-btn active" data-val="hidden">Hidden</button>
        </div>
      </div>
      <div class="setting-row">
        <span>Include lowered degrees (♭3 ♭6 ♭7)</span>
        <div class="toggle" id="toggleFlats"><div class="knob"></div></div>
      </div>
      <div class="setting-row">
        <span>Numerals mode shows note names</span>
        <div class="toggle" id="toggleNames"><div class="knob"></div></div>
      </div>
      <div class="setting-row">
        <span>Sound feedback</span>
        <div class="toggle on" id="toggleSound"><div class="knob"></div></div>
      </div>
      <div class="setting-row stack">
        <span>Guitar sound</span>
        <div class="segmented" id="guitarTypeSeg">
          <button class="seg-btn active" data-val="SteelString">Steel String</button>
          <button class="seg-btn" data-val="Classical">Classical</button>
          <button class="seg-btn" data-val="Electric">Electric</button>
        </div>
      </div>
      <button class="restart-btn" id="restartBtn">RESTART FROM ROOT</button>
    </div>
  </div>

  <div class="stage">
    <aside class="side" id="sidePanel">
      <div class="plaques">
        <div class="plaque current">
          <div class="eyebrow">Current</div>
          <div class="num" id="curNum">1</div>
          <div class="roman" id="curRoman">I</div>
        </div>
        <div class="plaque target">
          <div class="eyebrow">Find</div>
          <div class="num" id="tgtNum">5</div>
          <div class="roman" id="tgtRoman">V</div>
        </div>
      </div>
      <div class="side-slot" id="sideSlot"></div>
    </aside>

    <div class="board-area">
      <div class="fretboard-wrap" id="fretboardWrap">
        <div class="string-labels" id="stringLabels"><svg id="gutter"></svg></div>
        <div class="neck-scroll" id="neckScroll">
          <svg id="board"></svg>
        </div>
      </div>
    </div>
  </div>

</div>

<div class="rotate-lock">
  <div class="icon"></div>
  <h2>Turn your phone upright</h2>
  <p>Fretboardwalk runs the neck vertically, so it needs portrait. Rotate back to carry on.</p>
</div>

<script src="script.js?v=20260724"></script>

</body>
</html>
